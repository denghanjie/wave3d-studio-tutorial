<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./wavestudio-typescript-tutorial.html">
  <link rel="canonical" href="./wavestudio-typescript-tutorial.html">
  <title>WaveStudio TypeScript Tutorial</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fb;
      --ink: #18212b;
      --muted: #667085;
      --line: #d9e2ec;
      --blue: #3a86ff;
      --teal: #00a896;
      --radius: 8px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        linear-gradient(120deg, rgba(0, 168, 150, 0.1), transparent 32rem),
        linear-gradient(300deg, rgba(58, 134, 255, 0.1), transparent 34rem),
        var(--bg);
      color: var(--ink);
      font-family: var(--sans);
    }

    main {
      width: min(100%, 34rem);
      padding: 1.5rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 40px rgba(19, 34, 54, 0.1);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.5rem;
      padding: 0.55rem 0.85rem;
      border-radius: var(--radius);
      background: var(--ink);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    a:focus,
    a:hover {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main>
    <h1>WaveStudio TypeScript Tutorial</h1>
    <p>Opening the interactive tutorial...</p>
    <a href="./wavestudio-typescript-tutorial.html">Open tutorial</a>
  </main>
</body>
</html>
